<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Toast 提示 -->
  <div id="toast" class="toast hidden"></div>

  <div class="container">
    <header>
      <h1>AI Prompt Finder</h1>
      <button id="close-btn" class="close-btn">✕</button>
    </header>

    <!-- 统一上传区域：点击上传或粘贴图片 -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" hidden>
      <div class="upload-hint">
        <p>点击上传图片 / 粘贴图片 (Ctrl+V)</p>
        <p class="sub-hint">支持 JPG, PNG, JPEG, GIF, WEBP</p>
      </div>
    </div>

    <!-- 预览区域 -->
    <div id="preview-container" class="preview-container hidden">
      <img id="preview-image" src="" alt="Preview">
    </div>

    <!-- 加载状态 -->
    <div id="loading-area" class="loading-area hidden">
      <div class="spinner"></div>
      <p>正在分析图片...</p>
    </div>

    <!-- 结果区域 -->
    <div id="result-area" class="result-area hidden">
      <h3>识别结果</h3>
      <div id="prompt-output"></div>
      <div class="actions">
        <button id="copy-btn" class="btn-primary">复制英文</button>
        <button id="copy-zh-btn" class="btn-secondary">复制中文</button>
      </div>
    </div>

    <!-- 历史记录入口 -->
    <div class="history-link">
      <button id="history-btn">📜 历史记录</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
